# 宿主机 Nginx：将 80/443 反代到 Docker 的 web 容器（.env 中 WEB_PORT=8080 时 -> 127.0.0.1:8080）
# 用法：复制为 /etc/nginx/sites-available/smart_bird，改 server_name；ln -s 到 sites-enabled；nginx -t && systemctl reload nginx
#
# 与 docker compose 中前端构建的 VITE_API_BASE_URL=/api/v1 一致：浏览器只访问你的域名，/api/ 由容器内 Nginx 再转到 api 服务。

server {
    listen 80;
    # listen 443 ssl;  # 证书配好后启用，并补 ssl_certificate / ssl_certificate_key
    server_name your-domain.example.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
