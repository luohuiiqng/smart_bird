# CI：文档门禁 + NestJS API（Prisma / Postgres）
# 详见 docs/13-ci-cd-spec.md

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify documentation layout
        run: |
          set -euo pipefail
          test -f docs/README.md
          test -f docs/00-development-standards.md
          test -f docs/13-ci-cd-spec.md

  backend:
    needs: docs
    if: ${{ hashFiles('apps/api/package-lock.json') != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: exam_sys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d exam_sys"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/exam_sys?schema=public

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate (deploy)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
