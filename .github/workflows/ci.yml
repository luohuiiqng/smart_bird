# CI：文档门禁 + 可选 Node 工程（出现 package.json / lockfile 后自动启用）
# 详见 docs/13-ci-cd-spec.md

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify documentation layout
        run: |
          set -euo pipefail
          test -f docs/README.md
          test -f docs/00-development-standards.md
          test -f docs/13-ci-cd-spec.md

      - name: Setup Node.js
        # 任意一层出现 package.json 时再安装 Node（当前仅有 docs 时不执行）
        if: ${{ hashFiles('package.json') != '' || hashFiles('apps/api/package.json') != '' || hashFiles('apps/web/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: npm ci + lint + build + test（存在 lockfile 时）
        if: ${{ hashFiles('package-lock.json') != '' || hashFiles('apps/api/package-lock.json') != '' || hashFiles('apps/web/package-lock.json') != '' }}
        run: |
          set -euo pipefail
          run_root() {
            [ -f package-lock.json ] || return 0
            npm ci
            npm run lint --if-present
            npm run build --if-present
            npm run test --if-present
          }
          run_app() {
            local dir="$1"
            [ -f "$dir/package-lock.json" ] || return 0
            (cd "$dir" && npm ci && npm run lint --if-present && npm run build --if-present && npm run test --if-present)
          }
          run_root
          run_app apps/api
          run_app apps/web
