version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: smartbird-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartbird
      POSTGRES_PASSWORD: smartbird_dev
      POSTGRES_DB: smartbird_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbird -d smartbird_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - smartbird-network
    profiles: ["db"]

  # ============================================
  # Redis 缓存 & 队列
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: smartbird-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "smartbird_redis_pass"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smartbird-network
    profiles: ["db"]

  # ============================================
  # MinIO 对象存储
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: smartbird-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Console 端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - smartbird-network
    profiles: ["storage"]

  # ============================================
  # 后端 API 服务
  # ============================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: smartbird-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://smartbird:smartbird_dev@postgres:5432/smartbird_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: smartbird_redis_pass
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smartbird-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: ["api"]

  # ============================================
  # 前端 Web 服务（Next.js）
  # ============================================
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
    container_name: smartbird-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - api
    networks:
      - smartbird-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ["web"]

  # ============================================
  # Nginx 反向代理（生产）
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: smartbird-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/host-nginx-example.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL证书目录
    depends_on:
      - api
      - web
    networks:
      - smartbird-network
    profiles: ["prod"]

  # ============================================
  # Prometheus 监控
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: smartbird-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - smartbird-network
    profiles: ["monitoring"]

  # ============================================
  # Grafana 仪表板
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: smartbird-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - smartbird-network
    profiles: ["monitoring"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  smartbird-network:
    driver: bridge
